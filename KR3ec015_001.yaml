body:
  text: 上卷寒性諸藥識性此類最寒犀角解乎心熱羚羊清乎肺肝澤瀉利水通淋而補陰不足海藻散癭破氣而治疝何難聞知菊花能明目而清頭風射干療咽閉而消癰毒薏苡理腳氣而除風濕藕節消瘀血而止吐衄瓜蔞子下氣潤肺喘兮又且寬中車前子止瀉利小便兮尤能明目是以黃柏瘡用兜鈴嗽醫地骨皮有退熱除蒸之效薄荷葉宜消風清腫之施寬中下氣枳殼緩而枳實速也療肌解表乾葛先而柴胡次之百部治肺熱咳嗽可止梔子涼心腎鼻血最宜玄參治結熱毒癰清利咽膈升麻消風熱腫毒發散瘡痍嘗聞膩粉抑肺而斂肛門金箔鎮心而安魂魄茵陳主黃疸而利水瞿麥治熱淋之有血朴硝通大腸破血而療痰癖石膏墜頭疼解肌而消煩渴前胡除內外之痰實滑石利六腑之滯結天門冬止嗽補血冷而潤肝心麥門冬清心解煩渴而除肺熱又聞治虛煩除噦嘔須用竹茹通秘結導瘀血必資大黃宣黃連治冷熱之痢又厚腸胃而止瀉淫羊藿療風寒之痹用補陰虛而助陽茅根止血與吐衄石葦通淋於小腸熟地黃補虛而且療虛損生地黃宣血更醫眼瘡赤芍藥破血而療腹疼煩熱亦解白芍藥補虛而生新血退熱尤良若乃消腫滿逐水於牽牛除毒熱殺蟲於貫眾金鈴子治疝氣而補精血萱草根治五淋而消乳腫側柏葉治血崩漏之疾香附子理血氣婦人之用地膚子利膀胱可洗皮膚之風山豆根解熱毒能止咽喉之痛白鮮皮去風治筋弱而療足頑痹旋覆花明目治頭痛而消痰嗽壅又況荊芥穗清頭目便血疏風散瘡之用瓜蔞根療黃疸毒壅消渴解痰之憂地榆療崩漏止血止痢昆布破疝氣散癭散瘤療傷寒解虛煩淡竹葉之功倍除結氣破瘀血牡丹皮之用同知母止嗽而骨蒸退牡蠣澀精而虛汗收貝母消痰止嗽咳而利心肺桔梗下氣利胸膈而治咽喉若夫黃芩治諸熱兼主五淋槐花治腸風亦痊痔痢常山理痰結而治溫瘧葶藶瀉肺喘而通水氣此六十六種藥性之寒又當考圖經以博其所治觀夫方書以參其所用焉其庶幾矣熱性藥有溫熱又當審詳欲溫中以蓽撥用發散以生薑五味子止嗽痰且滋腎水膃肭臍療癆瘵更壯元陽原夫川芎祛風濕補血清頭續斷治崩漏益筋強腳麻黃表汗以療咳嗽韭子助陽而醫白濁川烏破積有消痰治風痹之功天雄散寒為去濕助精陽之藥觀夫川椒達下乾薑暖中葫蘆巴治膚冷之疝氣生卷柏破癥瘕而血通白朮消痰壅溫胃兼止吐瀉菖蒲開心氣散冷更治耳聾丁香快脾胃而止吐逆良薑止心氣痛之攻衝肉蓯蓉填精益腎石硫黃暖胃驅蟲胡椒主去痰而除冷秦椒主攻痛而治風吳茱萸療心腹之冷氣靈砂定心臟之怔忡夫散腎冷助脾胃須蓽澄茄療心疼破積聚用蓬莪朮縮砂止吐瀉安胎化酒食之劑附子療膚寒翻胃壯元陽之力白豆蔻治冷瀉療癰止痛於乳香紅豆蔻止吐酸消血殺蟲於乾漆豈不知鹿茸生精血腰脊崩漏之均補虎骨壯筋骨寒濕毒風之並怯檀香定霍亂而心氣之疼愈鹿角秘精髓而腰脊之痛除消腫益血於米醋下氣散寒於紫蘇扁豆助脾則酒有行藥破血之用麝香開竅則蔥為通中發汗之需嘗觀五靈脂治崩漏理血氣之刺痛麒麟竭止血出療金瘡之折傷鹿茸壯陽以助腎當歸補虛而養血烏賊止帶下且除崩漏目翳鹿角膠住血崩能補虛羸勞絕白花蛇治癱瘓除風癢之癩疹烏稍蛇療不仁去瘡瘍之風熱圖經云烏藥有治冷氣之理禹餘糧乃療崩漏之因巴豆利痰水能破積熱獨活療諸風不論久新山茱萸治頭暈遺精之藥白石英醫咳嗽吐膿之人厚朴溫胃而去嘔脹消痰亦驗肉桂行血而療心痛止汗如神是則鯽魚有溫胃之功代赭乃鎮肝之劑沉香下氣補腎定霍亂之心疼橘皮開胃去痰導壅滯之逆氣此六十二種藥性之熱又當博本草而取治焉溫性溫藥總括醫家素諳木香理乎氣滯半夏主於風痰蒼朮治目盲燥脾治濕宜用蘿蔔去膨脹下氣制面尤堪況夫鍾乳粉補肺氣兼療腎虛青鹽治腹疼且滋腎水山藥而腰濕能醫阿膠而痢嗽皆止赤石脂治精濁而止瀉兼補崩中陽起石暖子宮以壯陽更療陰痿誠以紫菀治嗽防風祛風蒼耳子透腦涕止威靈仙宣風氣通細辛去頭風止嗽而療齒痛艾葉治崩漏安胎而醫痢紅羌活明目驅風除筋攣腫痛白芷止崩治腫療痔漏瘡癰若乃紅藍花通經治產後惡血之餘劉寄奴散血療湯火金瘡之苦減風濕之痛則茵芋葉療折傷之症則骨碎補藿香葉辟惡氣而定霍亂草果仁溫脾胃而止嘔吐巴戟天治陰疝白濁補腎尤滋玄胡索理氣痛血凝調經有助嘗聞款冬花潤肺去痰嗽以定喘肉豆蔻溫中止霍亂而助脾撫芎定經絡之痛何首烏治瘡疥之資薑黃能下氣破惡血之積防己宜消腫去風濕之施藁本除風主婦人陰痛之用仙茅益腎扶元氣虛弱之衰乃曰破故紙溫腎補精髓與勞傷宣木瓜入肝療腳氣並水腫杏仁潤肺燥止嗽之劑茴香治疝氣腎疼之用訶子生津止渴兼療滑泄之疴秦艽攻風逐水又除肢節之痛檳榔豁痰而逐水殺寸白蟲杜仲益腎而添精去腰膝重當知紫石英療驚悸崩中之疾橘核仁治腰痛疝氣之瘨金櫻子兮澀遺精紫蘇子兮下氣涎淡豆豉發傷寒之表大小薊除諸血之鮮益智安神治小便之澀數麻仁潤肺利六腑之燥堅抑又聞補虛弱排膿瘡莫若黃耆強腰腳壯筋骨無如狗脊菟絲子補腎以明目馬藺花治疝而有功此五十四種藥性之溫更宜參圖經而默識也平性詳論藥品平和性存以硇砂而去積用龍齒以安魂青皮快膈除膨脹且利脾胃芡實益精治白濁兼補真元原夫木賊草去目翳崩漏亦醫花蕊石治金瘡血行則卻決明和肝氣治眼之劑天麻主脾濕祛風之藥甘草和諸藥而解百毒蓋以性平石斛平胃氣而補腎虛更醫腳弱觀夫商陸治腫覆盆益精琥珀安神而散血硃砂鎮心而有靈牛膝強足補精兼療腰痛龍骨止汗住濕更治血崩甘松理風氣而痛止蒺藜療風瘡而目明人參潤肺寧心開脾助胃蒲黃止崩治衄消瘀調經豈不以南星醒脾去驚風痰吐之憂三稜破積除血塊氣滯之症沒石主泄瀉而神效皂角治風痰而響應桑螵蛸療遺精之泄鴨頭血醫水腫之盛蛤蚧治勞嗽牛蒡子疏風壅之痰全蠍主風癱酸棗仁去怔忡之病嘗聞桑寄生益血安胎且止腰痛大腹子去膨下氣亦令胃和小草遠志俱有寧心之妙木通朱苓尤為利水之多蓮肉有清心醒脾之用沒藥乃治瘡散血之科郁李仁潤腸宣水去浮腫之疾茯神寧神益智除驚悸之疴白茯苓補虛勞多在心脾之有準赤茯苓破結血獨利水道以無過因知麥芽有助脾化食之功小麥止汗養心之力白附子去面風之遊走大腹皮治水腫之泛溢椿根白皮主瀉血桑根白皮主喘息桃仁破瘀血兼治腰疼神麯健脾胃而進飲食五加皮堅筋骨以立行柏子仁養心神而有益抑又聞安息香辟惡且止心腹之痛冬瓜仁醒脾實為飲食之資殭蠶治諸風之喉閉百合斂肺勞之嗽痿赤小豆解熱毒瘡腫宜用枇杷葉下逆氣噦嘔可醫連翹排瘡膿與腫毒石楠葉利筋骨與毛皮穀芽養脾阿魏除邪氣而破積紫河車補血大棗和藥性以開脾然而鱉甲治勞瘧兼破癥瘕龜甲堅筋骨更療崩疾烏梅主便血瘧痢之用竹瀝治中風聲音之失此六十八種平和之藥更宜參本草希求其詳焉諸品藥性陰陽論夫藥有寒熱溫涼之性酸苦辛鹹甘淡之味升降浮沉之能互相氣味厚薄不同輕重不等寒熱相雜陰陽相混或氣一而味殊或味同而氣異總而言之不可混說分而言之各有所能本乎天者親上本乎地者親下輕清成像重濁成形清陽發腠理濁陰走五臟清中清者榮養於神濁中濁者堅強骨髓辛甘發散為陽酸苦湧泄為陰氣為陽氣厚為陽中之陽氣薄為陽中之陰氣薄則發泄氣厚則發熱味為陰味厚為陰中之陰味薄為陰中之陽味薄則通味厚則泄升降浮沉之理胸中豁然而貫通矣人徒知藥之神者乃藥之力也殊不知乃用藥者之力也人徒知辨真偽識藥之為難殊不知分陰陽用藥之為尤難也藥性升降浮沉補瀉法足厥陰肝足少陽膽味辛補酸瀉氣溫補涼瀉手少陰心味鹹補甘瀉氣熱補寒瀉手太陽小腸味鹹補甘瀉氣熱補寒瀉足太陰脾足陽明胃味甘補苦瀉氣溫涼寒熱補瀉各從所宜手太陰肺手陽明大腸味酸補辛瀉氣涼補溫瀉足少陰腎足太陽膀胱味苦補咸瀉氣寒補熱瀉五臟更相平也一臟不平則病故曰安穀則昌絕谷則亡仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不溫血溫衛和榮衛將行常有天命矣諸臟五欲肝欲散急食辛以散之以辛補之以酸瀉之心欲軟急食鹹以軟之以咸補之以甘瀉之脾欲緩急食甘以緩之以甘補之以苦瀉之肺欲收急食酸以收之以酸補之以辛瀉之腎欲堅急食苦以堅之以苦補之以咸瀉之諸臟五苦肝苦急急食苦以緩之脾苦濕急食苦以燥之心苦緩急食酸以收之腎苦燥急食辛以潤之肺苦氣上急食苦以泄之開腠理致津液通其氣也五嗅湊五臟例臊氣入肝腥氣入肺香氣入脾焦氣入心腐氣入腎五行五色五味五走五臟主禁例東方之木其色青其味酸其臟肝肝主筋木曰曲直作酸酸走肝筋病人無多食酸南方之火其色赤其味苦其髒心心主血火曰炎上作苦苦走心血病人無多食苦西方之金其色白其味辛其臟肺肺生氣金曰從革作辛辛走肺氣病人無多食辛中央之土其色黃其味甘其臟脾脾主肉土曰稼穡作甘甘走脾肉病人無多食甘北方之水其色黑其味鹹其臟腎腎主骨水曰潤下作咸咸走腎骨病人無多食鹹手足三陽表裡引經主治例太陽足膀胱手小腸上羌活下黃柏少陰足腎手心知母黃連少陽足膽手三焦上柴胡下青皮厥陰足肝手胞絡青皮柴胡陽明足胃手大腸上升麻白芷下石膏太陰足脾手肺白芷桔梗諸藥瀉諸經之火邪黃連瀉心火梔子黃芩瀉肺火白芍瀉肝火柴胡黃連瀉肝膽火知母瀉腎火木通瀉小腸火黃芩瀉大腸火柴胡黃芩瀉三焦火黃柏瀉膀胱火諸藥相反例甘草反大戟芫花甘遂海藻烏頭反半夏瓜蔞貝母白及白蘞藜蘆反細辛芍藥人參沙參苦參丹參五臟補瀉主治例肝虛者陳皮生薑之類補之虛則補其母腎者肝之母也以熟地黃黃柏補之如無他證錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子以甘草瀉心心者肝之子也心虛者炒鹽補之虛則補其母肝者心之母也以生薑補肝如無他證錢氏安神丸主之實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散脾虛者甘草大棗之類補之實則黃連枳實瀉之如無他證錢氏益黃散主之虛則補其母心乃脾之母以炒鹽補心實則瀉其子肺乃脾之子以桑白皮瀉肺肺虛者五味子補之實則桑白皮瀉之如無他證錢氏阿膠散主之虛則補其母脾乃肺之母以甘草大棗補脾實則瀉其子腎者肺之子以澤瀉瀉腎腎虛者熟地黃黃柏補之腎無實不可瀉錢氏止有補腎地黃丸無瀉腎藥虛則補其母肺乃腎之母以五味子補肺已上五臟補瀉素問藏氣法時論備言之矣欲究其詳看本論用藥凡例頭角痛用川芎血枯亦用巔頂痛須用藁本遍身肢節痛須用羌活風濕亦用腹中痛須用白芍厚朴臍下痛須用黃柏青皮心下痛須用吳茱萸胃脘痛須用草豆蔻脅下痛須用柴胡日晡潮熱寒熱往來亦用莖中痛須用生甘草梢氣刺痛須用枳殼血刺痛須用當歸心下痞須用枳實胸中寒痞用去白陳皮腹中窄用蒼朮破血須用桃仁活血須用當歸補血須用川芎調血須用玄胡索補元氣須用人參調諸氣須用木香破滯氣用枳殼青皮肌表熱須用黃芩去痰亦用去痰用半夏去風痰須用南星諸虛熱須用黃耆盜汗亦用脾胃受濕用白朮去痰亦用下焦濕腫用漢防己草龍膽中焦濕熱用黃連下焦濕熱用芩煩渴用白茯苓葛根嗽者用五味子咳有聲無痰者用生薑杏仁防風咳有聲有痰者用半夏枳殼防風喘者須用阿膠天門冬麥門冬諸泄瀉須用白芍白朮諸水泄用白朮白茯苓澤瀉諸痢疾須用當歸白芍上部見血用防風中部見血用黃連下部見血用地榆眼暴發須用當歸黃連防風眼久昏暗用熟地黃當歸細辛解利傷風用防風為君白朮甘草為佐解利傷寒甘草為君防風白朮為佐凡諸風須用防風天麻諸瘡瘍須用黃柏知母為君連翹黃芩為佐小便不利須用黃柏知母為君茯苓澤瀉為佐瘧疾須用柴胡為君隨所發之時所屬經部分以升經藥導之以上諸藥此大略言之以為處方之階欲究其精於指掌珍珠囊中求之諸品藥性主治指掌羌活味苦甘平性微溫無毒升也陰中之陽也其用有五散肌表八風之邪利周身百節之痛排巨陽肉腐之疽除新舊風濕之證乃手足太陽表裡引經藥也升麻味苦平性微寒無毒升也陰中之陽也其用有四引蔥白散手陽明之風邪引石膏止足陽明之齒痛引諸藥遊行四經升陽氣於至陰之下因名之曰升麻柴胡味苦平性微寒無毒升也陰中之陽也其用有四左右兩旁脅下痛日晡潮熱往來生在臟調經內主血在肌主氣上行經手足少陽表裡四經白芷味辛性溫無毒升也陽也其用有四去頭面皮膚之風除皮膚燥癢之痹止足陽明頭痛之邪為手太陰引經之劑防風味甘辛性溫無毒升也陽也其用有二以氣味能瀉肺以體用通療諸風當歸味甘辛性溫無毒可升可降陽也其用有四頭止血而上行身養血而中守稍破血而下流全活血而不走獨活味苦甘平性微溫無毒升也陰中之陽也其用有三諸風掉眩頸項難伸風寒濕痹兩足不用及為足少陰之引經木香味苦辛性微溫無毒降也陰也其用有二調諸氣不可無泄肺氣不可缺檳榔味苦辛性溫無毒降也陰也其用有二墜諸藥性若鐵石治後重驗如奔馬吳茱萸味苦辛性熱有小毒可升可降陽也其用有四咽隘寒氣噎塞而不通胸中冷氣閉塞而不利脾胃停冷腹痛而不任心氣刺痛成陣而不止藿香葉味甘性溫無毒可升可降陽也其用有二開胃口能進飲食止霍亂仍除嘔逆川芎味辛性溫無毒升也陽也其用有二上行頭角助清陽之氣止痛下行血海養新生之血調經黃連味苦性寒無毒沉也陰也其用有四瀉心火消心下痞滿之壯主腸澼除腸中混雜之紅治目疾暴發宜用療瘡瘍首尾俱同黃芩味苦平性寒無毒可升可降陰也其用有四中枯而飄者瀉肺火消痰利氣細實而堅者瀉大腸火養陰退陽中枯而飄者除寒濕留熱於肌表細實而堅者滋化源退熱於膀胱大黃味苦性寒無毒其性沉而不浮其用走而不守奪土鬱而無壅滯定禍亂而致太平名之曰將軍黃柏味苦性寒無毒沉也陰也其用有五瀉下焦隱伏之龍火安上焦虛噦之蛔蟲臍下痛單制而能除腎不足生用而能補痿厥除濕藥不可缺玄明粉味辛甘酸性微溫無毒沉也陰也其用有二去胃中之實熱蕩腸中之宿垢其妙不可盡述大抵用此而代盆硝也白朮味甘性溫無毒可升可降陽也其用有四利水道有除濕之功強脾胃有進食之效佐黃芩有安胎之能君枳實有消痞之妙人參味甘性溫無毒升也陽也其用有三止渴生津液和中益元氣肺寒則可肺熱還傷肺黃耆味甘性溫無毒升也陽也其用有四溫肉分而實腠理益元氣而補三焦內托陰症之瘡瘍外固表虛之盜汗甘草味甘平無毒生之則寒炙之則溫生則分身梢而瀉火炙則健脾胃而和中解百毒而有效助諸藥而無爭以其甘能緩急故有國老之稱半夏味辛平生寒熟溫有毒降也陽也其用有四除濕化痰涎大和脾胃氣痰厥及頭疼非此莫能治陳皮味辛苦性溫無毒可升可降陽中之陰也其用有二留白補胃和中去白者消痰泄氣青皮味苦性寒無毒沉也陰也其用有四破滯氣愈低而愈效削堅積愈下而愈良引諸藥至厥陰之分下飲食入太陰之倉枳殼味苦酸性微寒無毒沉也陰也其用有四消心下痞塞之痰泄腹中滯塞之氣推胃中隔宿之食削腹內連年之積枳實味苦酸性微寒無毒沉也陰也其用有四消胸中之虛痞逐心下之停水化日久之稠痰削年深之堅積桔梗味苦性寒微溫有小毒升也陰中之陽也其用有四止咽痛兼除鼻塞利隔氣仍治肺癰一為諸藥之舟楫一為肺部之引經知母味苦性寒無毒沉也陰中之陰也其用有四瀉無根之腎火療有汗之骨蒸止虛勞之陽勝滋化源陰之生藁本味苦辛性微溫無毒升也陰中之陽也其用有二大寒氣客於巨陽之經苦頭痛流於巔頂之上非此味不除生地黃味甘苦性寒無毒沉也陰也其用有四涼心火之血熱瀉脾土之濕熱止鼻中之衄熱除五心之煩熱熟地黃味甘苦性溫無毒沉也陰也其用有四活血氣封填骨髓滋腎水補益真陰傷寒後脛股最痛新產後臍腹難禁五味子味酸性溫無毒降也陰也其用有四滋腎經不足之水收肺氣耗散之金除煩熱生津止渴補虛勞益氣強陰川烏味辛性熱有毒浮也陽中之陽也其用有二散諸風之寒邪破諸積之冷痛白芍藥味酸平性寒有小毒可升可降陰也其用有四扶陽氣大除腹痛收陰氣徙健脾經墮其胎能逐其血損其肝能緩其中白茯苓味苦淡性溫無毒降也陽中之陰也其用有六利竅而除濕益氣而和中小便多而能止大便結而能通心驚悸而能保津液少而能生白者入壬癸赤者入丙丁澤瀉味甘咸性寒無毒降也陽中之陰也其用有四去胞垢而生新水退陰汗而止虛煩主小便淋澀仙藥療水病濕腫靈丹薄荷葉味辛性涼無毒升也陽也其用有二清利六陽之會首祛除諸熱之風邪麻黃味苦甘性溫無毒升也陰中之陽也其用有二其形中空散寒邪而發表其節中閉止盜汗而固虛厚朴味苦辛性溫無毒可升可降陰中之陽也其用有二苦能下氣去實滿而消腹脹溫能益氣除濕滿散結調中杏仁味苦甘性溫有毒可升可降陰中之陽也其用有二利胸中氣逆而喘促潤大腸氣秘而難便巴豆味辛性熱有大毒浮也陽中之陽也其用有二削堅積蕩臟腑之沉寒通閉塞利水穀之道路斬關奪門之將不可輕用黑附子味辛性熱有大毒浮也陽中之陽也其性浮而不沉其用走而不息除六腑之沉寒補三陽之厥逆蒼朮氣味主治與白朮同補中除濕力不及白寬中發汗功過於白秦艽味苦辛平性微溫無毒可升可降陰中之陽也其用有二除四肢風濕若懈療遍體黃疸如金白殭蠶味酸辛平性微溫無毒升也陰中之陰也其用有二去皮膚風動如蟲行主面部䵟生如漆點白豆蔻味辛性溫無毒升也陽也其用有四破肺中滯氣退目中雲氣散胸中冷氣補上焦元氣地榆味苦甘酸性微寒無毒沉也陰也其用有二主下部積熱之血痢止下焦不禁之月經連翹味苦平性微寒無毒升也陰也其用有二瀉諸經之客熱散諸腫之瘡瘍阿膠味甘平性微溫無毒降也陽也其用有四保肺益金之氣止嗽蠲咳之膿補虛安妊之胎治痿強骨之力桃仁味苦甘平性寒無毒降也陰也其用有二潤大腸血秘之便難破大腸久蓄之血結生薑味辛性溫無毒升也陽也其用有四製半夏有解毒之功佐大棗有厚腸之益溫經散表邪之風益氣止翻胃之噦石膏味辛甘性大寒無毒沉也陰也其用有二制火邪清肺氣仲景有白虎之名除胃熱奪甘食易老云大寒之劑桂味辛性熱有毒浮也陽中之陽也氣之薄者桂枝也氣之厚者肉桂也氣薄則發泄桂枝上行而發表氣厚則發熱肉桂下行而補腎此天地親上親下之道也細辛味辛性溫無毒升也陽也其用有二止少陰合病之首痛散三陽數變之風邪梔子味苦性大寒無毒沉也陰也其用有三療心中懊憹顛倒而不得眠治臍下血滯小例而不得利易老去輕飄而眾肺色赤而象火又能瀉肺中之火葛根味甘平性寒無毒可升可降陽中之陰也其用有四發傷寒之表邪止胃虛之消渴解中酒之奇毒治往來之溫瘧瓜蔞根味苦性寒無毒沉也陰也其用有二止渴退寒熱補虛通月經豬苓味淡甘平性溫無毒降也陽中之陰也其用有二除濕腫體用兼備利小水氣味俱長乾薑生則味辛炮則味苦可升可降陽也其用有二生則逐寒邪而發表炮則除胃冷而守中草龍膽味苦性寒無毒沉也陰也其用有二退肝經之邪熱除下焦之濕腫蘇木味苦咸平性寒無毒可升可降陰也其用有二破瘡瘍死血非此無功除產後敗血有此立驗杜仲味辛甘平性溫無毒降也陽也其用有二強志壯筋骨滋腎止腰疼酥炙去其絲功效如神應天門冬味苦平性大寒無毒升也陰也其用有二保肺氣不被熱擾定喘促陡得康寧麥門冬味苦平性寒無毒降也陽中之陰也其用有四退肺中隱伏之火生肺中不足之金止燥渴陰得其養補虛勞熱不能侵木通味甘平性寒無毒降也陽中之陰也其用有二瀉小腸火積而不散利小便熱閉而不通瀉小腸火無他藥可比利小便閉與琥珀同功地骨皮味苦平性寒無毒升也陰也其用有二療在表無定之風邪主傳屍有汗之骨蒸桑白皮味甘性寒無毒可升可降陽中之陰也其用有二益元氣不足而補中虛瀉肺氣有餘而止咳嗽甘菊花味苦甘平性微寒無毒可升可降陰中之陽也其用有二散八風上注之頭眩止兩目欲脫之淚出紅花味辛性溫無毒陽也其用有四逐腹中惡血而補血虛之血除產後敗血而止血暈之暈赤石脂味甘酸性溫無毒降也陽中之陰也其用有二固腸胃有收斂之能下胎衣無推蕩之峻通草味甘平性微寒無毒降也陽中之陰也其用有二陰竅澀而不利水腫閉而不行澀閉兩俱立驗因有通草之名烏梅味酸平性溫無毒可升可降陰也其用有二收肺氣除煩止渴主泄痢調胃和中川椒味辛大熱有毒浮也陽中之陽也其用有二用之於上退兩目之臀膜用之於下除六腑之沉寒萎蕤味甘平性溫無毒降也陽中之陰也其用有四風淫四末不用淚出兩目皆爛男子濕注腰疼女子面注黑䵟皆能療治秦皮味苦性寒無毒沉也陰也其用有四風寒邪合濕成痹青白色幻翳遮晴女子崩中帶下小兒風熱癇驚白頭翁味苦性溫無毒可升可降陰中之陽也其用有四敷男子陰疝偏腫治小兒頭禿膻腥鼻衄血無此不效痢赤毒有此獲功牡蠣味鹹平性寒無毒可升可降陰也其用有四男子夢寐遺精女子赤白崩中榮衛往來虛熱便滑大小腸同乾漆味辛平性溫有毒降也陽中之陰也其用有二削年深堅結之沉積破日久秘結之瘀血南星味甘辛性溫有毒可升可降陰中之陽也其用有二墜中風不省之痰毒主破傷如屍之身強商陸味酸辛平性寒有毒降也陽中之陰也其味酸辛其形類人其用療水其效如神葶藶味苦性寒無毒沉也陰中之陰也其用有四除遍身之浮腫逐膀胱之留熱定肺氣之喘促療積飲之痰厥海藻味苦咸性寒無毒沉也陰中之陰也其用有二利水道通閉結之便泄水氣消遍身之腫竹葉味苦辛平性寒無毒可升可降陽中之陰也其用有二除新舊風邪之煩熱止喘促氣勝之上衝蔥白味辛性溫無毒升也陽也其用有二散傷風陽明頭痛之邪止傷寒陽明下利之苦天麻味辛平性溫無毒降也陽也其用有四療大人風熱頭眩治小兒風癇驚悸卻諸風麻痹不仁主癱瘓語言不遂大棗味甘性溫無毒降也陽也其用有二助脈強神大和脾胃葳靈仙味苦性溫無毒可升可降陰中之陽也其用有四推腹中新舊之滯消胸中痰唾之痞散苛𤸜皮膚之風利冷疼腰膝之氣鼠黏子味辛平性微寒無毒降也陽也其用有四主風濕癮疹盈肌退風熱咽喉不利散諸種瘡瘍之毒利凝滯腰膝之氣草豆蔻味辛性寒無毒浮也陽也其用有二去脾胃積滯之寒邪止心腹新舊之疼痛玄胡索味苦辛性溫無毒可升可降陰中之陽也其用有二活精血療產後之疾調月水主胎前之證用藥法象天有陰陽風寒暑濕燥火三陰三陽上奉之溫涼寒熱四氣是也溫熱者天之陽也寒涼者天之陰也此乃天之陰陽也地有陰陽金木水火土生長化收藏下應之辛甘淡酸苦鹹五味是也辛甘淡者地之陽也酸苦鹹者地之陰也此乃地之陰陽也陰中有陽陽中有陰平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之人身之陰陽外為陽內為陰背為陽腹為陰臟為陽腑為陰心肝脾肺腎五臟為陰膽胃大腸小腸膀胱三焦六腑為陽所以知陽中之陰陰中之陽者何也如冬病在陰夏病在陽春病在陰秋病在陽知其所在則施針藥也背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陰脾也此皆陰陽表裡內外雌雄相輸應也四時用藥法不問所病或溫或涼或熱或寒如春時有疾於所用藥內加清涼風藥夏月有疾加大寒之藥秋月有疾加溫氣藥冬月有疾加大熱藥是不絕生化之源也錢仲陽治小兒深得此理內經曰必先歲氣無伐天和是為至治又曰無違時無伐化又曰無伐生生之氣此皆常道用藥之法若反其常道而變生異證矣則當從權施治用藥九散仲景云銼如麻豆大與㕮咀同取清汁循其經絡故治至高之病加酒以煎去濕加生薑補元氣以大棗發散風邪寒邪以蔥白膈上痰以細末者不循經絡止去脾胃上痰及臟腑之疾氣味厚者白湯調服氣味薄者煎以和滓服去下部之疾者其丸極大而光中焦之疾者次之上焦者極小稠麵糊取之遲化直至下焦或酒或醋取其收散之意也犯半夏南星或欲去濕者以生薑汁稀麵糊取其易化水浸宿蒸餅為丸及滴水為丸者又易化也煉蜜為丸者取遲化而氣循經絡也蠟丸者取其遲化而旋旋施功矣大抵湯者蕩也去久病用之散者散也去急病用之丸者緩也徐緩而治之也用藥身根梢法凡根之在土者中半已上氣脈上行以生苗者為根中半已下者氣脈下行入土以為梢病在中焦上焦者用根下焦者用梢則根升而梢降也
