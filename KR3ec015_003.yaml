頭瘡瘰癧癭瘤同可覓天南星專能下氣風痰腦痛止怔忡夏枯草至夏即枯故名之味苦寒無毒天南星處處有之味苦辛有毒散血墮胎消癰腫退腫消風牽牛子第一諸瘡解毒山慈菰最良牽牛子用炒過味苦寒有毒處處有之下氣通腸利大小便墮胎專治腰疼腳痛山慈菰名兒燈檠一名金燈花瘡腫癰疽瘰癧消毒良仙茅伸風者之腳掌補虛堅骨苧根涼小兒之丹毒安護胎宮仙茅味辛溫無毒治虛勞逐冷氣益陽堅骨生長精神苧根補血安胎止渴兼小兒丹毒茵芋理寒熱似瘧屋遊斷齒衄之縱茵芋味苦溫有毒止心腹痛通關節主風寒濕痹屋遊即瓦上青苔味苦寒無毒逐膀胱水止皮膚寒熱木部豈不以勞傷須桂肉斂汗用桂枝俱可行經破癖炒過免墮胎兒桂味甘辛大熱有小毒得人參熟地黃紫石英良畏生蔥五痔腸風稱槐角瘡瘍殺疥羡松枝槐角實味酸鹹寒無毒今處處有之除熱氣主火燒瘡皮灌漱風疳齒松脂味苦甘溫無毒處處有之道家服餌輕身延年松實味甘溫無毒可供果品葉與根白皮味苦溫無毒主辟穀不飢松節溫漬酒治歷節風柏葉止衄吐崩帶安臟鎮驚去殼取仁於柏子枸杞益陽明目退虛勞寒熱須用其根地骨皮柏葉味苦微溫無毒四時各依方面採陰乾用柏白皮主火燒爛瘡枸杞子味苦寒根大寒子微寒無毒處處有惟泉州出者佳茯苓有赤白二種赤者通利小便白者可補虛定悸乾漆有生熟兩般生則損人腸胃炒熟通月水愆期茯苓味甘平無毒多年松根之氣熏所生有赤白二種併除寒熱止渴消痰而赤者專主利小便分水穀白者專補虛定悸乾漆味辛溫有毒須炒熟用則無毒去癥續骨殺蟲除心氣血痛茯神則健志收驚開心益智琥珀則鎮心定魄淋病偏宜茯神即茯苓抱根所生者用須去心中木味甘平無毒多益心脾主風虛琥珀味甘平無毒是松脂入地中多年則化成職掌虛煩斂汗必須酸棗性行通利消浮當用榆皮酸棗仁味酸平無毒安五臟除風氣痹能堅骨補中寧心志榆皮味甘平無毒性滑通行大小便消浮腫治小兒白禿下婦人胎元攻目赤清頭風堅齒輕身蔓荊子斂金瘡除腰痛治風桑上寄生枝蔓荊子味苦辛微寒溫無毒通關竅去寸白蟲除筋骨中寒熱桑寄生一名寓木味苦甘平無毒並治崩中補內傷胎前産後皆宜用瀉痢有功訶梨勒同名訶子頭眩鼻塞木筆花乃是辛夷訶子味苦溫無毒開冒進食消痰治崩漏及腸風下血兼主奔豚冷氣辛夷味辛溫無毒處處有之南人謂之迎春木久服輕身奈老二月開花色白帶紫花落無子至夏復開花初出如筆故北人呼為木筆花主頭眩鼻塞最良烏藥主寬膨順氣沒藥主拆跌金瘡血氣相攻諸疼共理秦椒能明目通喉蜀椒能澀精療癖溫中下氣風痹同醫烏藥味辛溫無毒處處有之惟天台産者為勝俗名旁箕主心腹痛補中益氣攻翻胃利小便沒藥味苦平無毒按徐表南州記生波斯國是彼處松脂也破血止痛為産後最宜推陳致新理內傷良秦椒味辛溫生溫熟寒有毒攻腹痛治風邪溫中除痹醋煎灌漱牙疼蜀椒去閉口者味辛溫大熱有毒出成都逐冷風核名椒目利水道牙痛乳癰求莽草腸風崩帶索棕櫚莽草為臣性有毒味辛溫善開喉痹理諸瘡瘰癧棕櫚性平無毒止痢養血消鼻紅用燒存性入藥巴豆破結宣腸理心膨水脹芫花消浮逐水擊瘤痔當知巴豆味辛溫生溫熟寒有毒生巴郡故名巴豆性急通利因名江子用去皮心膜及油然後用畏大黃黃連芫花味辛苦溫有小毒治咳逆喉鳴痰唾腰腹心痛木鱉治瘡瘍腰痛有準雷丸殺三蟲寸白無疑木鱉子生形似鱉故名之味甘溫無毒治乳癰肛門腫兼折傷雷丸味苦咸寒有小毒白者良赤者有毒能殺人養腎除風石南葉漱牙洗目海桐皮石南葉味辛苦平有毒利皮毛筋骨病海桐皮味苦平無毒主痢除疥蝨治痹痛風牡荊子酒擂敷乳腫郁李仁蕩浮腫四肢牡荊子味苦溫無毒即黃荊今官司作笞杖行刑者處處有之主頭風目眩郁李仁味酸平無毒俗名唐棣通關格去浮腫根皮治齒痛風蛀密蒙花總皆眼科之要領蘇方木專調産後之血迷密蒙花味甘平微寒無毒蘇方木味甘鹹平無毒專能破血消癰及撲損楮實補虛明眼目葉洗疹風樹漿塗癬疥竹皮刮下止嘔吐葉解煩躁燒瀝御風痰楮實味甘寒無毒主塗水腫及陰痿不起竹皮多種取皮止嘔吐者南人呼為江南竹味辛平甘寒無毒肉薄今人取作行瀝者又謂之淡竹其葉解煩除咳逆今方中用淡竹葉又是一種叢小葉柔微有毛其根生子如麥門冬樗白皮止痢斷疳葉汁洗瘡除疥蝨胡桐淚殺風牙蛀膨脹滿吐堪施樗白皮與椿白皮性同良但樗木臭椿木香味苦有毒樗木根葉俱良南北皆有之兩木最為無異俗呼作虎目樹胡桐淚味鹹寒無毒形似黃礬得水便消如硝石也結胸散痞寬膨逐水調風宜枳殼煩悶通淋解熱赤眸黃疸用山梔枳殼以小緊實少穰者為枳實味苦酸微寒無毒能攻痔痿消癥癖山梔子味苦寒無毒生於山間者為山梔人家園囿種時者為黃梔形肥壯可染物用方中用山梔形緊小者入藥檳榔攻腳氣殺三蟲宣通臟腑厚朴乃溫中除霍亂膨脹堪治檳榔味辛溫無毒生海南向日曰檳榔形尖如雞心者良向陰曰大腹子平坐如饅頭檳榔下氣除風宣利臟腑攻逐水消痰破結厚朴去粗皮薑汁炒過味苦溫無毒須川中厚有紫油者佳通經下氣厚腸胃消穀食安腹中長蟲豬苓消渴利漩治傷寒中暑龍腦清頭明目主驚搐小兒豬苓味甘苦平無毒生土底皮黑作塊似豬糞故名之治咳瘧消腫利水止遺精龍腦味辛苦微寒一云溫平無毒其香透腦攻耳聾消風氣通九竅即梅花片腦若服餌過多至一兩許則身冷如醉氣絶而非中毒益性寒故也明目涼肝解熱毋遺黃柏磨癥下乳行經休缺紫葳黃柏圖經名黃蘖味苦寒無毒除血痢去黃疸治癰瘡祛脾胃熱治女子熱崩紫葳花一名凌霄花味鹹微寒無毒處處有之治風熱痛及癇證杜仲堅筋補損傷兼主腎虛腰脊痛衛茅殺鬼決經閉陰人崩帶也能醫杜仲味辛甘平無毒折斷如銀絲用薑汁和炒去絲用除風冷強心志衛矛即鬼箭羽味苦寒無毒攻腹痛破癥結癰腫癥瘤憑虎杖殺蟲砥痔問蕪荑虎杖俗名班杖根微溫味甘平無毒治傷損消瘡毒蕪荑味辛平無毒逐冷除心痛兼治皮膚骨節風殺疥蟲治癬攻腸風蕤仁搗膏點眼科最除熱赤皂莢為末搐鼻嚏應釋妖迷蕤仁核味甘溫微寒無毒通結氣鼻洪皂莢味辛咸溫有小毒亦有數種長一尺半尺者惟如豬牙者良消痰除嗽散腫痛去頭風沒石子治痢生肌染烏黑髭發益智子澀精氣止小便多遺沒石子即無食子味苦溫無毒出西番用有竅者良治陰瘡陰汗益智子味辛溫無毒安神定志故謂之益智川楝子號金鈴冷氣膀胱能作主五倍子名文塔腸風五痔效端殊川楝子味苦寒有小毒今處處有之但蜀川者為良根皮最殺蛇蟲五倍子味酸平無毒除齒𧈟及瘡膿亦可洗眼去風熱吳茱萸下氣消痰提轉筋霍亂山茱萸添精補腎治風痹無疑吳茱萸味辛溫大熱有小毒今處處有之除咳逆逐邪風主腳氣攻心山茱萸一名石棗味酸平微溫無毒療耳聾調女人月水桑白皮瀉肺補虛益氣大腹皮通腸健胃開脾桑白皮味甘寒無毒即桑樹根皮利水道消浮腫殺寸白蟲大腹皮即檳榔大腹子之皮微溫無毒專下氣分冷熱攻心痛金櫻子冬青子養精益腎輕身調和五臟蘇合香安息香辟惡去蟲殺鬼蠱毒消除金櫻子味酸澀平無毒採實搗汁熬膏久服輕身奈老冬青子又名女貞實味苦平無毒治病與金櫻子同功蘇合香味甘溫無毒香油能辟惡除溫瘧久服令人不生夢安息香味辛苦平無毒辟邪暖腎止遺泄秦皮洗眼磨昏男子添精婦人收帶下黃藥通喉豁痹蛇傷取效醫馬是神樞秦皮味苦寒無毒治風寒濕痹黃藥味苦平無毒治惡腫苦菜主頭疼痢生腹痛同薑煎服鉤藤蠲瘛瘲兒生客忤勝禱神祗苦菜即茶茗味甘苦微寒無毒除痰下氣消宿食鉤藤味甘平微寒無毒其形如鉤故得名舒筋活血止痛生肌麒麟竭舒筋展痹五加皮麒麟竭一名血竭味鹹平無毒除血暈五加皮味辛苦溫微寒無毒治風寒濕痹止心痛益精神通疝氣治陰瘡小兒幼小不能行服之良丁香下氣溫中能益脾止吐沉香調中順氣療痛絞心歧丁香味辛溫無毒散腫除風毒更治齒痛風牙沉香味辛溫無毒療腫除風去水止霍亂轉筋壯元陽辟惡氣檀香藿香止霍亂吐嘔痛連心風乳香楓香專消風止痛瘡毒流離檀香熱無毒消風腫腎氣攻心藿香味辛微溫去惡消腫治吐逆乳香味辛熱微毒辟惡除邪補精益腎治諸瘡攻血氣楓香即白膠香是楓脂也治癮疹風瘙齒痛去虛浮水氣味辛平微有毒竺黃理天吊止驚風更會清心明目胡椒能下氣逐風冷兼除霍亂昏迷天竺黃味甘寒無毒生天竺國故名胡椒味辛微溫無毒去痰止痢卒患心腹痛此木部之藥性為後學之繩規繩規為方圓之器也人部看方猶看律意在精詳用藥如用兵機毋輕發草木之性既陳人物尤宜立決律法度也齊之以刑用藥猶將兵謂醫者乃人之司命天靈蓋最主傳尸久病虛熱蒸在骨天靈蓋乃死人頂骨十字解者此骨是天生天賜蓋壓一身之骨節陽人用陰陰人用陽味鹹平無毒主傳尸鬼疰人熱病及陽毒發狂當求人糞汁打撲損傷並新産快索童男溺人糞汁一名人中黃性寒無毒專治天行大熱勞氣骨蒸燒末水調服解諸毒為末湯調治熱病發狂絞糞汁飲之童男溺童子小便也女子者不宜用主寒熱虛勞頭疼濕氣乳汁有點眼之功裩襠救陰陽之易婦人乳汁味甘平無毒能安五臟悅皮膚昔張倉嘗服享壽百餘歲衍義云乳汁治眼之功何多蓋人心主血肝臟血肝受血則能視婦人之血上為乳汁下為月水用以治目不亦宜乎裩襠即裩之當陰處割取方圓六七寸許燒為末用男子病新差而婦人與之交則男病陰易女人病新差而男子與之交則女病陽易小腹絞痛攣手足目中生花頭重不能舉若不急治則死男子病用婦人裩襠女人病用男子裩襠以水調服調諸淋破瘀血亂髮原來即血餘止唾衄理肺痿溺垢便是人中白血餘乃常人亂髮燒灰味苦微溫無毒治癰疽及轉胞人中白即尿桶中澄底垢積之結白者火上燒灰最治緊唇及勞熱傳尸圖經衍義無虛醫者可知端的禽獸部蓋言走者屬獸飛者屬禽禽屬陽身輕故能飛而上獸屬陰身重惟能走不能上飛鹿角煎膠補瘦羸又安胎止痛麝香辟邪而通竅安客忤驚癇鹿角味苦辛依法煎煉成膠及霜入藥用止泄精遺尿麝香味辛溫無毒攻風産墮胎救産難定魄安魂牛黃治風癇驚熱生肌止汗龍骨攻泄痢遺精牛黃味苦平有小毒除狂躁治天行龍骨味甘平微寒無毒治女子崩止小便遺瀝療陰瘡龍齒鎮驚治顛癇牛乳補諸虛益氣通腸須求羊酪獺肝開熱脹傳尸勞嗽有驗堪應牛乳味微寒性平無毒止渴獺肝為君味辛溫有毒凡人素有冷氣虛膨者此二味皆不宜服象牙出肉中之刺熊膽醫痔痢之靈象牙味甘平無毒生煮汁飲之利小便燒末止遺尿磨屑敷肉中刺凡骨鯁者磨水服即下更祛勞熱止風癇熊膽味苦寒無毒然難分真偽取一粟許滴水中一道如線不散者為真治天行熱疸諸疳惡防風地黃羚羊角明目祛風可保驚狂心錯亂膃肭臍溫中補腎何憂夢與鬼交情羚羊角味鹹苦寒無毒可活胎易産益氣安心辟邪膃肭臍味鹹性熱無毒主驚癇消宿血除痃癖氣阿膠止血安胎兼除嗽利犀角涼心解毒殺鬼聞名阿膠味苦微溫無毒出阿縣城北井水煮取烏驢皮以阿井水煎成膠為真須用一片鹿角同煎方成膠不爾不成也養肝虛勞極止四肢痠疼犀角味苦酸咸寒無毒驅風明目除心熱狂言又治時行疫癘鹿茸益氣補虛男伐泄精女徵崩漏虎骨驅邪辟惡男安風毒女保胎驚鹿茸用茄形連頂骨者味甘酸溫無毒一云味苦辛虎骨性平味辛微熱無毒治惡瘡及風痹拘攣兔頭骨主頭疼和髓燒灰催産難牛角腮治崩帶燒灰入藥效如神兔頭骨味甘平寒無毒治頭昏痛兔骨治熱中消渴肉不可多食損人陽氣孕婦食兔肉生子缺唇不可合雞肉同生薑食牛角腮味苦甘無毒消血閉便血攻冷痢瓦雀肉則益氣卵則強陰白丁香可潰癰療目雄雞烏者補中赤者止血黃䏶胵止遺尿難禁瓦雀肉味甘溫無毒雀糞直立者名白丁香雄雞肉微溫無毒烏者補中止痛赤者止血治崩諸雄雞膽微寒主目不明心主五邪血主損傷肪主耳聾腸主小便數不禁肝及左翅手主陰痿不起冠血能行乳汁蝙蝠經名伏翼能開黑暗青瞑蝙蝠經名伏翼味鹹無毒主淋目昏久服則忘憂糞名夜明砂可治疳藥是伐病之斤醫乃人之司命蟲魚部抑又聞蠢者為蟲潛者為魚堪行入藥貴賤何拘蠢動也潛澄藏也全蠍有毒須當去能透耳聾療諸風驚搐斑貓熟炒不宜生通淋墮孕宣瘰癧之疵全蠍宜緊小者佳味甘辛須去毒方可用斑貓去足翅以米同炒至米黃色去米生用即令人吐瀉味辛寒有大毒消水氣去癭瘤無如海蛤安心志磨翳障大喜珍珠海蛤味苦咸平無毒治浮腫除咳逆定喘消煩珍珠味苦咸平無毒出廣州主潤澤皮膚悅人顏色綿包塞耳可治聾水蛭吮癰疽通經破血田螺去目熱反胃堪除水蛭即馬蝗蜞生水中名水蛭生草中名草蛭生泥中名泥蛭並能著人及牛馬股脛間咂血用之當用水蛭小者佳此物極難死加火炙經年得水猶可活若用之須火炒令黃極熟不爾入人腹生子為害田螺性大寒無毒不可多食其肉敷熱瘡殼主翻胃汁能醒酒止渴須用田中取者佳鼠婦通月閉利便癃仲景將來醫久瘧蟅蟲破堅癥磨血積傷寒方內不曾無鼠婦味酸溫無毒生人家地上處處有之蟅蟲名土鱉味鹹寒有毒處處有之搜瘛瘲驚風明目催生稱蛇蛻正喎斜口眼墮胎點翳捉衣魚蛇蛻味鹹苦平無毒主纏喉風攻頭瘡瘰癧衣魚味鹹溫無毒今處處有之衣中乃少多在書卷中小兒淋閉以摩臍及小腹即溺通仍可摩瘡出箭頭入肉醫附骨鼠瘻蜣螂便是推車客補打撲損傷療兒疳昏眼蝦蟆本草即蟾蜍蜣螂味鹹寒有毒療兒驚瘛風癇臨用當炙過勿置水中令人吐入藥去足翅蝦蟆肉味辛寒有毒主邪氣堅瘕惡瘡鼠癧殺伏尸鬼疰三蟲地龍俗名蚯蚓止風賊斜喎脫肛蝸牛本是蛞蝓地龍味苦無毒須用白頸者良傷寒狂熱須咽汁治痢消丹毒用糞蝸牛俗名蜞螺處處有之生沙石垣籬下濕處亦治背疽用涎塗抹蠐螬點眼翳雜科割金瘡出肉中刺蛤蚧傳尸堪止嗽兼補肺邪鬼咸驅蠐螬味鹹甘有毒處處有之以背行反快於腳即諸朽木中蠹蟲但潔白者佳蛤蚧一名守宮功力在尾稍人捕之即自咬斷其尾用以法取之行常一雌一雄相隨入藥亦當用雌雄相隨則良牡蠣固漏血遺精補虛止汗虹蟲破癥瘕血積經閉通渠牡蠣味鹹平微寒無毒主瘧疾寒熱除驚恐虻蟲味苦微寒有毒咂牛馬背血出用炒除足翅方可入藥鰻鱺魚退勞熱骨蒸殺蟲愈痔石龍子除熱淋止血蜥蜴殊途鰻鱺魚味甘有毒處處有之雖毒而能補五臟虛損消項腮白駁風熱肉薰蚊則滅石龍子與蜥蜴蝘蜒蠑螈守宮五種相形烏賊魚是海螵蛸退翳殺蟲治崩攻痢鯪鯉為穿山甲堪醫疥癬鬼魅遭鋤烏賊魚骨味鹹微溫無毒療陰瘡治耳聾其血似墨能吸波潠墨以混水所以自衛有八足聚生口旁浮泛於水面鳥見謂其必死欲啄之則聚足抱鳥拖入水中食之故曰賊魚穿山甲性涼有毒主邪驚治痹勞熱骨蒸尊鱉甲脫肛狐臭尚蜘蛛鱉甲味鹹平無毒處處有之治崩療瘧主癥瘕痃癖不可與雞子同食合莧菜食傷人蜘蛛性冷無毒處處有之然多種身有毛刺及五色並薄小者並不可用瘰癧背瘡炷牙兼治口斜喎僻喜忘者取網著衣領中蟬蛻消風斷小兒夜哭之鬼蝟皮主痔捷腸風下血之徒蟬退味鹹甘寒無毒亦治婦人産難小兒驚癇蝟皮味苦甘無毒治疝氣陰蝕瘡鯉魚寬胎脹骨止赤白之崩膽抹青盲赤目蟹主熱結胸黃能化漆為水血燒集鼠招𪕐鯉魚味苦甘寒無毒止渴消腫腹有癥瘕之人不可食蟹味鹹寒有毒爪能破血墮胎鯽魚治腸風下血宜作鱠又宜作羹治痢無分赤白蛙能補損祛勞一種水雞為羹饌專補産婦之虛鯽味甘溫無毒燒灰治諸瘡補胃和中蛙噤味甘寒無毒殺疰邪蜈蚣開小兒口噤墮孕婦之胎制諸蛇毒土狗摧産難之生罨肉中之刺退腫須臾蜈蚣味辛溫有毒不堪入藥湯殺三蟲入藥當熟炒生則令人吐瀉土狗即螻蛄味鹹寒無毒處處有之下腫利大小便解毒潰癰石決明瀉肝黑障青盲終可決桑螵蛸補腎泄精遺溺竟無虞石決明味鹹平涼無毒除肺經風熱桑螵蛸味鹹甘平無毒即螳螂子也用炒黃色不爾令人泄瀉原蠶蛾主泄精好強陰道白殭蠶治諸風口噤難呼蠶蛾雄者有小毒炒去翅足補腎療血風痹風癮疹用蠶砂殭蠶炒去絲嘴味鹹平辛無毒療驚癇崩漏病又除口噤及喉風白花蛇主諸風濕痹拘攣兼疥癩五靈脂行經閉昏迷産婦早來沾白花蛇與烏梢味甘咸溫有毒主諸風喎斜口眼並治大風瘡五靈脂即寒號蟲糞也治腸風並冷氣炒之治崩著意要行斯道潛心細下工夫果品部且如果品數端亦分優劣以果品言之如柿有數種紅者只可生啖烏者可焙乾入藥用其蒂功力且優白者力薄而功力劣入藥當知判反忌宜性情要辨苦甘冷熱大棗與生蔥相刑不宜合食烏梅與黃精相反常食黃精者不可食梅實如桃仁杏仁忌用雙仁者有毒殺人安石榴味酸者宜入藥用苦甘者不宜多食損人齒傷人肺又如橘味辛溫柚味苦冷棗味甘熱柿味甘寒之類橘皮則下氣寬中消痰止嗽更可止嘔定吐大棗則養脾扶胃助藥成功又可補氣調脈陳皮味辛溫無毒主溫脾青者破積聚大棗味甘平無毒雞頭實為芡實輕身長志好止腰疼覆盆子是蓬虆益氣強陰養精最烈芡實味甘平無毒補中治痹煎和金櫻實最益人覆盆子味酸平咸處處有之補中調和臟腑治風虛損柿干止痢澀腸生宜解酒渴止噦須教用蒂良梨實除煩引飲漿可療風痰乳婦金瘡如仇賊柿干味甘寒無毒最潤喉通耳鼻梨味甘微酸寒無毒可止嗽不宜多食成冷痢乳婦及金瘡猶不可食橄欖止渴生津口唇乾燥研敷核中仁石榴舒筋止痢去腹中蟲根皮煎汁啜橄欖味酸甘溫無毒消酒毒安石榴味甘酸無毒殼入藥治筋攣腳痛攻痢良藕實止痢補心垣節除嘔衄葉堪止渴安胎桃仁通經破癥結乃輟腰疼花主下利膿血藕味甘平寒無毒處處有之桃仁去皮尖味苦甘平無毒其花通利小便杏仁不用雙仁通腸潤肺治咳清音烏梅即是梅實止嗽化痰痢中莫缺杏仁去皮尖及雙仁者味酸甘無毒治驚癇腹痹及産乳金瘡烏梅味酸平無毒下氣調中止渴治骨蒸勞熱宣木瓜治霍亂轉筋調理腳氣濕痹伸舒枇杷葉能止嘔和胃專掃肺風功全口渴木瓜酸溫無毒消腫強筋骨止渴並腳氣攻心枇杷葉用布拭去毛炙用味苦平無毒主肺風胡桃肉肥肌潤肉撲傷和酒研來嘗草果仁益氣溫中好伴常山攻瘧發胡桃肉味甘平無毒去痔瘡消瘰癧草果仁味辛溫無毒溫脾胃消宿食解酒毒攻冷氣若能熟此作筌諦可洗下工之陋拙米穀部精明米穀豆麥粟麻雖民生之日用充藥料於醫家谷入脾豆入腎麥肝粟肺麻入心粳米溫中和胃秫米能解漆瘡止渴除煩須陳倉米黃豆殺鬼辟邪黑豆乃堪入藥若問黃卷便是豆芽粳米味甘溫無毒即常人所食之米其種數多不可盡識主除煩斷痢豆黑白二種惟黑者入藥白者不用味甘平無毒炒熟入藥祛胃熱養腎虛通利小腸粟米可長生填精髓巨勝子即胡麻粟味鹹微寒無毒治消中巨勝子久服之可長生不老利大小腸堅筋快産主心驚味甘平無毒處處有即黑麻子赤小豆消水腫虛浮研塗癰疽消熱毒白扁豆治筋轉霍亂葉敷蛇蟲咬最佳赤小豆炒過用味甘酸平無毒治消渴攻腳氣白扁豆味甘微寒無毒消暑解毒下氣和中小麥止汗養肝堪除燥熱大麥主飢消渴長胃榮華大小麥味甘微寒無毒麥蘖入藥湯真個溫中可知消食麥麩若調醋敷撲損處愈後無瑕麥蘖麥芽也麩皮也去丹風解一切之毒霍亂吐翻取粉於緑豆除浮疸吐一切痰涎閉胸膈病摘蒂於甜瓜緑豆甘寒無毒除熱氣止頭疼目暗甜瓜味苦寒有毒處處有之蒂入藥瓜有赤白二種入藥當用赤者言之有準用之無差菜蔬部既已言之五穀又當取用菜蔬蔥主頭疼堪發散通大小腸白可安胎止痛韭專補腎益元陽溫中下氣子收夢中精遺蔥味辛溫無毒韭味辛微酸溫無毒蔥韭皆不可多食昏人精神又不可與蜜同食搗汁止頭疼喘嗽風痰萊蔔子酒煎噴痘體自然紅潤説胡荽萊蔔即蘿蔔也味辛甘無毒根腦及嫩葉常人作生菜食之熟啖消食和中下氣去痰癖肥健人胡荽味辛溫微毒消穀通心竅補五臟不足利大一小便辟邪白冬瓜劫躁煩止渴白芥子寬胸膈痰拘冬瓜味甘微寒無毒治淋利小便解熱散癰除小腸熱醒脾用子中仁尤良白芥味辛溫無毒青白紫數種唯白芥子粗大色白者入藥除冷氣攻反胃治上氣婦人産難好催生滑臟利泄冬葵子霍亂轉筋心腹痛減煩卻暑羡香薷冬葵子味甘寒無毒處處有之其子是秋種覆養經冬至春作子故謂之冬葵子除寒熱治疳用根香薷味辛微溫無毒下氣除煩熱消腫止渴發病生蟲又敗陽便是蕓薹菜生瘡長痼精神損少吃水茄兒蕓薹萊味辛溫有毒不宜多食敗損陽氣生腹中長蟲主破癥瘕通血除丹毒消乳癰茄子有紫白二種味甘寒性冷不宜多食茄根煎湯漬凍瘡蒂燒灰治腸風婦人惡血能令下濕痹筋攣取豆芽黃卷瘡疥傷寒最得宜血風血暈向荊芥假蘇大豆黃卷以黑豆大者為芽蘖生便曬乾名黃卷入藥用味甘平無毒荊芥即假蘇味辛溫無毒下氣除勞兼治頭痛馬齒莧散血敷瘡敷大丹殺蟲磨翳草蘩蔞發背瘡瘍丹風起爛搗堪塗馬齒莧處處有之味酸寒微毒止渴攻血痢磨眼翳利便難草蘩蔞味酸平無毒名雞腸菜消痰定喘寬膨當求蘇葉風氣頭疼發散功要薄荷紫蘇味辛溫無毒葉下紫色而氣香者佳消痰下氣開胃用葉風氣頭疼發散用莖寬喘急治咳嗽用子薄荷味辛苦溫無毒發汗消食寬脹除霍亂傷寒可發散飴糖斂汗建中補虛羸不小神麯養脾進食使胃氣有餘飴糖味甘微溫無毒以糯米煮候冷入麥芽澄清再熬成飴糖以淨器盛貯夏天澄沉井中免令酸諸米可作飴惟糯米者入藥止渴消痰治嗽神麯味甘大暖消宿食下氣調理産人去瘀生新猶用醋通行血脈助添藥勢酒同途醋一名苦酒治癰除癥消癰退腫酒味苦甘無大熱有毒辟惡除邪破癥結香豉本食中之物醫傷寒切不可無淡豆政味苦寒無毒治頭疼發汗止痢解煩熱以酒浸爛搗患腳人敷之良不揣愚衷而作賦是為藥性之斤銖揣量度也
