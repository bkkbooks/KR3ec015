body:
  text: 下卷玉石部藥能治病醫乃傳方當明藥品貴賤良毒之異須嘗氣味酸鹹苦辣辛甘切以金銀珠玉之貴白堊石灰之賤藥性之良則丹砂鍾乳氣毒則信石硇砂至於五味酸入腎苦入心辛入肺甘入脾辣則有溫涼寒熱之異功力有急緩性職有溫涼且如朴硝之性急若煎作芒硝性乃緩慢矣本草之作肇始炎皇肇始也炎皇神農氏也本草之為書由神農嘗百草二日而七十毒始與醫藥相救謂之本草未言草木之品彙且提玉石之紀綱仿本草圖經以玉石部為先而草木之品次之金屑玉屑辰砂石床能驅邪而逼鬼祟可定魄而制癲狂止渴除煩安鎮靈臺明眼目金屑味辛平有毒處處有之梁益寧州最多出水砂中得屑謂之生金若不煉服之殺人玉屑味甘平無毒生藍田丹砂一名硃砂味甘微寒無毒惟辰州者最勝故謂之辰砂生深山石崖間穴地數十尺始見其苗乃白石耳謂之硃砂床即石床也砂生石床上亦有淘土石中得之非生於石者又按本草石床自有本條味甘溫無毒謂鍾乳水下凝積生如筍狀漸長久與上乳相接為柱出鍾乳堂中謂之石床人心謂之靈臺金屑玉屑辰砂石床四品之性主治相同皆可依圖經法煉服食則延年不老生銀屑鎮驚安五臟鍾乳粉補虛而助陽銀屑味辛平有毒生銀屑當取見成銀薄以水銀銷之為泥合硝石及鹽研為粉燒出水銀淘去鹽石為粉極細用石鐘乳味甘溫無毒道州者最佳須煉服之不然使人病淋治咳嗽行乳道補髓添精強陰道益肺家代赭石能墮胎而可攻崩漏伏龍肝治産難而吐血尤良代赭石用火煅醋淬七遍研水飛味甘寒無毒出代州其色赤故名代赭石養血氣強精辟邪畏天雄附子伏龍肝灶中土也味辛微溫微毒消癰腫催生下胞止血崩雲母補勞傷兼明目水銀除疥蟲與瘡瘍雲母石味甘平無毒安五臟堅肌止痢局方有法煎雲母膏專治癰疽惡毒等瘡水銀即朱朱液能消化金銀使成泥味辛寒有毒一名汞畏磁石難産可用催生治風喉理鼻息功全礬石止漏下破癥結用禹餘糧礬石味酸寒無毒出晉州者佳化痰止痢攻陰蝕諸瘡漏煉過謂之枯礬亦可生用禹餘糧用火煉醋淬七次搗細水飛味甘寒平無毒出潞州形如鵝鴨卵外有殼重疊者是其中有黃細末如蒲黃者謂之石中黃朴硝開積聚化停痰煎作芒硝功卻緩硝石止躁煩除熱毒煉之須掃地邊霜朴硝味苦辛大寒無毒生益州初採掃得一煎而成故曰朴硝再取朴硝淋汁煉之有細芒者謂之芒硝專治傷寒硝石味辛苦寒無毒即掃地霜淋汁煉成者打破瞳人得空青而依然復舊胎宮乏孕紫石英再弄之璋空青味甘酸寒無毒生於有銅處銅精氣熏則生今信州時有之其腹中空破之有漿者絶難得大者如雞子小者如豆子治眼翳醫障為最要又有曾青同出處色理亦無異但其形纍纍色未相似其中則不空與空青功效不相上下紫石英味辛溫無毒專治女子風寒在子宮絶孕十年無子服之白石英治風濕痹安魂魄強陰道黃赤黑色皆不入藥熱渴急求寒水石壯陽須索石硫黃寒水石一名凝水石味甘寒無毒出汾州及邯鄲即鹽之精也治火燒丹毒能解巴豆毒畏地榆硫黃味酸溫大熱有毒出廣州治疥蟲𧈟瘡堅筋療老人風祕腎臟既衰煉磁石而強陽道膀膀不利炒食鹽以尉臍旁磁石味辛咸寒無毒有鐵處則生惡牡丹畏黃石脂能吸鐵補益勞傷兼治耳聾食鹽味鹹溫無毒解州者勝治霍亂癖痰可用吐之水銀飛煉成輕粉殺諸疥癬善治兒疳石灰風化方為勝不堪服食可療金瘡輕粉即水銀粉味辛冷無毒畏磁石忌一切血風化石灰五月五日採百草搗汁調煉過石灰末作團陰乾專治金瘡刀斧傷處不堪入藥石膏發汗解肌去風寒熱滑石除煩止渴快利小腸石膏味甘辛大寒無毒與方解石相類須用細理雪白者為真治頭痛解肌發汗黃色者服之使人淋滑石味甘寒無毒用白色軟嫩者佳能益精除熱療女人産難殺三蟲破癥結胡粉一名粉錫斂金瘡淘眼暗銅青銅緑競無雙胡粉一名粉錫一名定粉俗名光粉即今化鉛所作婦人容面者味辛寒無毒銅青銅緑以醋沃銅上即生乃銅之精華也微有毒不入藥湯吐痰抵痔蜜陀僧兼抹點斑隨手沒生肌止痛無名異折傷可理並金傷蜜陀僧即練銀爐底也味酸辛有毒無名異味甘平無毒金謂刀斧所傷也硼砂攻喉痹止嗽消痰真有理膽礬除熱毒諸癇痰氣盡消詳硼砂一名蓬砂味甘辛暖無毒出南番者色重褐其味和其效速出西戎者其色白其味雜其功緩不堪入藥作金銀銲藥用之膽礬圖經作石膽味酸辛寒有毒信州有之生於銅坑中採得煎煉而成消熱毒療諸風癱瘓可吐風痰伏火靈砂闢鬼邪安魂魄明目鎮心通血脈藏泥白堊除泄痢破癥瘕澀精止漏又為良靈砂一名二氣砂用水銀一兩硫黃六銖研細二味先同炒作青砂色後入水火既濟爐中抽之如束針紋者成就也惡磁石畏酸水白堊即白善土味苦辛溫無毒處處有之採無時石燕治淋催難産黑鉛安鎮尉蛇創石燕産零陵州形似蠟其實石也性涼無毒女人産難兩手各握一枚胎立出黑鉛味甘無毒有銀坑處皆有粉錫胡粉光粉皆化鉛所作又鉛白霜以鉛雜水銀煉作片置醋甕中密封經久成霜謂之鉛白霜性急於也創傷也黃丹乃是熬鉛作生肌止痛礬石特生非常熱養就丹房黃丹圖經作鉛丹又名號丹用時炒令赤色研細味辛微溫無毒止吐逆發癲癇敷金瘡良礬石俗呼鎮風石味辛甘大熱有毒嚴寒置水中令水不冰性堅硬而拒火燒之一日夜方解散攻擊積聚痼冷之病最良須真者必取鶴巢中團卵而助暖氣者方真乃修真煉丹之藥品血暈昏迷法煉廣生花蕊石折傷排膿火煉醋淬自然銅花蕊石出陝州閿鄉縣性至堅硬保金瘡止血局方以硫黃合和花蕊石如法煉成專治産後血暈去惡血自然銅味辛平無毒出銅處有之形方而大小不等似銅實石也不從礦煉自然而生故曰自然銅也硇砂能破癥瘕積聚若還生用爛心腸信石會吐膈內風痰倘中其毒促人亡硇砂味鹹苦辛溫有毒能消五金八石腐人腸胃生服之化人心為血信石圖經名砒霜信州者佳故名信石味苦酸有大毒主諸瘧風痰在胸膈可作吐藥用不宜多服能傷人命若誤中硇砂砒霜二毒急宜冷水研緑豆汁飲之可解梁上塵消軟癤通喉噎橫生立産井泉石性寒涼攻火熱除翳神方梁上塵一名烏龍尾性微寒無毒凡使須去煙火遠高堂佛殿上者拂下篩過用井泉石性大寒無毒處處有之以饒陽郡者為勝得菊花梔子最良疔痼冷止頭疼無遺太陰玄精石安心志制癲狂誰知鐵粉和鐵漿玄精石出解州解縣今解池積鹽倉中亦有之其色青白龜背者良味鹹溫無毒鐵味甘無毒取鐵浸之經久色青沫出可染皂者為鐵漿治癲狂鐵拍作片段置醋糟中積久生衣刮取者為胤鐵粉安心志雄黃能殺虺蛇毒妊娠佩帶轉生男子煉之久服自身輕要生女子佩帶雌黃雄黃雌黃同山所生山向陽處生雄黃山陰有金處金精熏則生雌黃婦人覺有孕以雄黃一兩絳囊盛帶之可轉女為男以雌黃半兩素囊盛帶之則轉男為女雌黃煉服久則輕身可入仙家備金石之品味治病得以推詳草部上觀夫天生庶民地生百草人生不無札瘥之常以致病於壽夭草有治病之功用何花苗實腦蒸衆也實子腦根菖蒲開心明耳目去濕痹風寒菊花消散濕痹風主頭眩痛攪菖蒲一名昌陽須用生石磧上一寸九節者良味辛溫無毒菊花味苦甘平無毒主胸中煩熱明目聰耳治渴補虛安五臟快覓人參溫中解毒性平和無如國老人參一曰人參味甘微寒微溫無毒反藜蘆甘草味甘平無毒主解百毒為衆藥之王故號國老反大戟芫花白朮益脾止瀉嘔若動氣不宜蒼朮平胃壓山嵐用米泔浸炒白朮味甘辛無毒主風寒濕痹益脾胃補虛勞消腫傷寒有動氣者不宜服蒼朮用米泔浸一宿換泔浸炒乾去皮味苦甘辛無毒治傷寒痹痛溫瘧可發散生地黃能行血兼止吐衄折傷熟地黃能補血重治虛勞焦躁生地黃大寒亦治産後血攻心及女人經水閉絶熟地黃淨洗酒浸蒸三兩次焙乾味甘溫無毒熟乾則溫補生干則平宣熟者止崩漏安魂魄治驚悸補內傷天門冬鎮心止吐血衄血性冷而能補大虛麥門冬解渴開結益心腸勞熱可除煩可保天門冬味苦甘平大寒無毒悅人顏色麥門冬味甘平微寒無毒二味並抽去心焙乾用地膚子車前子除熱去風明眼目能令膀胱水穀分菟絲子巴戟天添精補髓主延年解去腰疼誠有效地膚子即落帚子味苦寒無毒車前子味甘咸寒無毒能滑胎止瀉利菟絲子味辛平無毒水洗澄去砂土酒浸一宿蒸過乘熱杵成膏焙乾再入藥方可研成末巴戟天須用連珠者去心酒浸焙乾味辛甘微溫無毒除風強力強筋治夢與鬼交牛膝補虛攣膝痛月經若閉亦能通柴胡去熱治勞傷主療傷寒功力到牛膝為君味苦酸平無毒柴胡味苦平辛微寒無毒治濕痹拘攣可用煎湯浴之下氣消痰止嗽傷寒為要藥草決明瀉肝熱明目驅風兼貼鼻洪草龍膽益肝虛驚惕無憂疳蟲可掃草決明味鹹苦甘平微寒無毒草龍膽味苦寒無毒益肝明目最治疸庵䕡子性苦寒風寒濕痹水氣皆寬茵陳篙性苦冷時氣發黃淋難可導庵䕡處處有之味苦微寒無毒久服輕身明目茵陳蒿味苦平微寒無毒治淋難小便祕澀不通也遠志葉名小草堪收夢裡遺精黃精俗字山薑久服延年不老遠志用去骨以甘草湯浸煮炒乾味苦溫無毒苗名小草一似麻黃但無節能令生智慧定心驚黃精俗字山薑味甘平無毒然與鉤吻相似但一善一惡要仔細辨認切勿誤用鉤吻則傷人至死謂之鉤吻北五味補虛下氣止嗽強筋南木香止痢健脾氣疼是寶五味子味酸甘咸苦辛故名五味性溫無毒止渴消酒毒木香形如枯骨者佳不見火味辛溫無毒去膀胱冷氣除癥瘕止瀉痢金瘡止血王不留行是名剪金花風疹赤丹本草景天即是慎火草王不留行味苦平無毒可催生産利月經景天味苦酸平無毒主勞煩大熱瘡女人漏下用花良絡石治癰瘡消熱毒苗似龍鱗川芎醫頭痛主筋攣形如雀腦絡石為君即石鱗又名龍鱗薛荔味苦溫微寒無毒畏貝母菖蒲川芎一名芎藭明目瘡家止痛味辛溫無毒蘼蕪即其苗也白芷為之使金叉石斛能使元陽壯腰疼膝痛並皆驅鬼臉升麻用解百毒消疹痘斑瘡寧可效石斛草味苦平無毒入腎壯陽平胃氣升麻味苦平微寒無毒能解一切毒除熱去風為傷寒時氣之要也煙塵續斷安胎産療金瘡逮不可遲染絳茜根理風寒止吐血須宜乎早續斷味苦辛微溫無毒最能接骨因名續斷茜根一作蒨即今染絳茜草根也味苦性微寒解中蠱毒虺床蛇床同一種治風濕癢及陰瘡羌活獨活本來同頭痛筋攣風氣撓虺床即蛇床味苦辛甘平無毒羌活獨活本同類但紫色而節密者為羌活黃色而作塊者為獨活味苦甘平微溫無毒細辛薯蕷能溫中下氣仍主腦腰疼薏苡萎蕤治痹弱筋攣並風濕之悼細辛味辛溫無毒主拘攣風痹明目破痿治婦人血閉薯蕷俗名山藥味甘溫平無毒補心氣不足鎮心神薏苡仁味甘寒無毒主肺氣肺癰萎蕤葉似黃精味甘平無毒切勿誤用鉤吻則傷人止渴補虛收盜汗黃耆奏不小之功消癰散腫有高能忍冬是至賤之草黃耆味甘微溫無毒主虛勞強筋治耳聾止痛排膿忍冬草即鷺鷥藤又名金銀花其蔓左纏亦名左纏藤味甘溫無毒今處處有之澤瀉會除諸般瀉弭渴疏淋防風主治一切風仍蠲頭痛澤瀉味甘咸寒無毒止泄精逐膀胱水多服令人眼病防風味甘辛溫無毒能解附子毒明目止汗療崩蒺藜陰痛煎湯頭痛酒煎蒲黃行血用生止血用炒蒺藜味甘辛溫微寒無